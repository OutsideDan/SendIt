<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c070d8"/>
      <stop offset="50%"  stop-color="#e84080"/>
      <stop offset="100%" stop-color="#ff9050"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0,0,0,0.32)"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Lightning bolt — white, centered, crisp at all sizes -->
  <path d="M310,65 L160,268 L252,268 L195,450 L355,245 L263,245 Z"
        fill="white"
        filter="url(#shadow)"/>
</svg>
